<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="오늘의 영어">
<meta name="theme-color" content="#534AB7">
<title>오늘의 영어</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;--purple-dark:#3C3489;
  --bg:#F5F4FA;--surface:#FFFFFF;--surface2:#F0EFF8;
  --text:#1A1830;--text2:#6B6885;--text3:#A8A6BC;
  --border:rgba(83,74,183,0.12);--border2:rgba(83,74,183,0.22);
  --red:#E53935;--red-light:#FFEBEE;
  --radius:14px;--radius-sm:8px;--radius-pill:20px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#12111F;--surface:#1E1C30;--surface2:#28263C;--text:#EAE8FF;--text2:#9A98B8;--text3:#5E5C78;--border:rgba(175,169,236,0.12);--border2:rgba(175,169,236,0.24);--red-light:rgba(229,57,53,0.15)}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.app-header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.app-title{font-size:17px;font-weight:600;color:var(--purple)}
.app-date{font-size:12px;color:var(--text3)}
.main{flex:1;overflow-y:auto;padding:16px 16px 100px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding:8px 0 max(12px,env(safe-area-inset-bottom));z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 0;transition:color 0.15s}
.tab i{font-size:22px}
.tab.active{color:var(--purple)}
.card{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);padding:20px;margin-bottom:12px}
.card-sm{padding:14px 16px}
.section-label{font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.section-label i{font-size:14px}
.badge-date{display:inline-block;font-size:11px;font-weight:600;color:var(--purple);background:var(--purple-light);padding:3px 10px;border-radius:var(--radius-pill);margin-bottom:10px}
@media(prefers-color-scheme:dark){.badge-date{background:rgba(83,74,183,0.25)}}
.folder-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--radius-pill);margin-bottom:14px;margin-left:6px}
.korean{font-size:19px;font-weight:500;line-height:1.5;margin-bottom:10px}
.english{font-size:24px;font-weight:700;color:var(--purple);line-height:1.35;margin-bottom:16px}
.audio-player{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px}
.play-btn{width:40px;height:40px;border-radius:50%;background:var(--purple);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.play-btn i{color:white;font-size:18px}
.audio-info{flex:1;min-width:0}
.audio-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.audio-hint{font-size:11px;color:var(--text3);margin-top:1px}
.no-audio{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text3)}
.no-audio i{font-size:18px;flex-shrink:0}
.thinking-box{background:var(--purple-light);border-left:3px solid var(--purple-mid);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 12px;font-size:13px;color:var(--purple-dark);line-height:1.6}
@media(prefers-color-scheme:dark){.thinking-box{background:rgba(83,74,183,0.15);color:#AFA9EC}}
.word-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--purple-light);color:var(--purple);font-size:12px;font-weight:500;padding:4px 12px;border-radius:var(--radius-pill)}
@media(prefers-color-scheme:dark){.chip{background:rgba(83,74,183,0.2)}}
.explanation{font-size:14px;color:var(--text);line-height:1.8}
.empty{text-align:center;padding:48px 20px}
.empty i{font-size:48px;color:var(--text3);display:block;margin-bottom:12px}
.empty p{font-size:15px;color:var(--text2);margin-bottom:6px}
.empty small{font-size:13px;color:var(--text3)}
/* Folder chips */
.folder-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.folder-chip{font-size:12px;font-weight:500;padding:5px 13px;border-radius:var(--radius-pill);border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all 0.15s}
.folder-chip.active{background:var(--purple);color:white;border-color:var(--purple)}
/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:16px;font-weight:600}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px}
.cal-nav i{font-size:22px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{text-align:center;font-size:11px;color:var(--text3);padding:6px 0}
.cal-day{text-align:center;font-size:14px;padding:8px 2px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);border:none;background:none;min-height:36px;display:flex;align-items:center;justify-content:center}
.cal-day.has{color:var(--text);font-weight:500;background:var(--surface2)}
.cal-day.today{background:var(--purple-light);color:var(--purple);font-weight:600}
@media(prefers-color-scheme:dark){.cal-day.today{background:rgba(83,74,183,0.25)}}
.cal-day.sel{background:var(--purple);color:white;font-weight:600}
.cal-day.empty{cursor:default;background:none}
.cal-legend{display:flex;gap:16px;justify-content:center;font-size:11px;color:var(--text3);margin-top:10px;align-items:center}
.cal-legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
/* All */
.expr-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:10px}
.expr-item:active{background:var(--surface2)}
.expr-item-body{flex:1;min-width:0}
.expr-item-date{font-size:11px;font-weight:600;color:var(--purple);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.expr-item-kor{font-size:13px;color:var(--text2);margin-bottom:3px}
.expr-item-eng{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.expr-item-chevron{color:var(--text3);font-size:16px;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--purple);font-size:14px;font-weight:500;margin-bottom:16px;padding:0}
.back-btn i{font-size:18px}
.detail-actions{display:flex;gap:8px;margin-bottom:16px}
.btn-edit{flex:1;padding:9px;background:var(--purple-light);color:var(--purple);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-delete{padding:9px 14px;background:var(--red-light);color:var(--red);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
/* Admin */
.admin-block{margin-bottom:20px}
.admin-heading{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.admin-heading i{font-size:17px;color:var(--purple)}
.form-group{margin-bottom:10px}
label.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block}
input[type=text],input[type=date],textarea,select{width:100%;font-size:14px;padding:10px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none}
input[type=text]:focus,input[type=date]:focus,textarea:focus,select:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:72px;line-height:1.6}
.btn-primary{width:100%;padding:13px;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:20px 16px;text-align:center;cursor:pointer;background:var(--surface2);width:100%}
.upload-zone i{font-size:28px;color:var(--purple);display:block;margin-bottom:6px;line-height:1}
.upload-zone p{font-size:13px;color:var(--text2)}
.upload-zone input{display:none}
.file-chip{display:flex;align-items:center;gap:8px;background:var(--purple-light);border-radius:var(--radius-sm);padding:8px 12px;margin-top:8px}
@media(prefers-color-scheme:dark){.file-chip{background:rgba(83,74,183,0.2)}}
.file-chip i{color:var(--purple);font-size:18px;flex-shrink:0}
.file-chip span{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip button{background:none;border:none;cursor:pointer;color:var(--text2);padding:2px;flex-shrink:0}
.divider{height:0.5px;background:var(--border);margin:16px 0}
.entry-list-item{display:flex;align-items:center;padding:11px 14px;background:var(--surface);border-radius:var(--radius-sm);border:0.5px solid var(--border);margin-bottom:8px;cursor:pointer}
.entry-list-item:active{background:var(--surface2)}
.entry-list-item-left{flex:1;min-width:0}
.entry-list-date{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.entry-list-text{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-list-item>.entry-delete{background:none;border:none;cursor:pointer;color:var(--red);padding:6px;flex-shrink:0;font-size:18px}
.entry-list-item>i.chevron{color:var(--text3);font-size:16px;flex-shrink:0}
/* Folder manager */
.folder-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.folder-color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.folder-name-text{flex:1;font-size:14px;color:var(--text)}
.folder-delete-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;font-size:16px}
/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:24px;width:100%;max-width:320px}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:8px}
.confirm-msg{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-cancel{flex:1;padding:11px;background:var(--surface2);color:var(--text2);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer}
.confirm-ok{flex:1;padding:11px;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--purple);color:white;padding:10px 20px;border-radius:var(--radius-pill);font-size:13px;font-weight:500;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
.screen{display:none}
.screen.active{display:block}
</style>
</head>
<body>
<header class="app-header">
  <span class="app-title">오늘의 영어</span>
  <span class="app-date" id="header-date"></span>
</header>
<main class="main">
  <div class="screen active" id="screen-today"></div>
  <div class="screen" id="screen-all"></div>
  <div class="screen" id="screen-calendar"></div>
  <div class="screen" id="screen-admin"></div>
</main>
<nav class="tab-bar">
  <button class="tab active" onclick="showTab('today')"><i class="ti ti-star"></i><span>오늘</span></button>
  <button class="tab" onclick="showTab('all')"><i class="ti ti-books"></i><span>전체</span></button>
  <button class="tab" onclick="showTab('calendar')"><i class="ti ti-calendar"></i><span>달력</span></button>
  <button class="tab" onclick="showTab('admin')"><i class="ti ti-settings"></i><span>관리</span></button>
</nav>
<div class="toast" id="toast"></div>
<script>
const DB = 'english_study_v2';
const DB_FOLDERS = 'english_study_folders_v1';

const FOLDER_COLORS = ['#534AB7','#E53935','#43A047','#FB8C00','#00897B','#1E88E5','#8E24AA','#F06292'];

const DEFAULT_FOLDERS = [
  {id:'f1', name:'일상표현', color:'#534AB7'},
  {id:'f2', name:'비즈니스', color:'#1E88E5'},
  {id:'f3', name:'숙어', color:'#43A047'},
];

const SAMPLE = [
  {id:1,date:'2026-06-15',folder:'f1',korean:'사는게 다 그렇지 뭐',english:'Such is life.',thinking:'그런(것이) 이야 인생.',words:'such - a. 그러한',explanation:'"such"처럼 형용사가 명사처럼 쓰이면 뒤에 "thing or person"이 생략되어 있습니다.',audioName:null,audioData:null},
  {id:2,date:'2026-06-16',folder:'f3',korean:'잠깐 쉬면서 마음 좀 추스려.',english:'Take a break and smell the roses.',thinking:'취해/하나의 휴식을 그리고 냄새맡어/그 장미들을\n*smell the roses [로우지즈] : 여유를 가지다',words:'smell the roses [로우지즈]\n: 여유를 가지다',explanation:'"smell the roses"는 비유적 표현으로, 여유롭게 주변을 즐기라는 의미예요.',audioName:null,audioData:null}
];

function load(){try{return JSON.parse(localStorage.getItem(DB)||'null')||[...SAMPLE]}catch(e){return[...SAMPLE]}}
function loadFolders(){try{return JSON.parse(localStorage.getItem(DB_FOLDERS)||'null')||[...DEFAULT_FOLDERS]}catch(e){return[...DEFAULT_FOLDERS]}}
function save(d){localStorage.setItem(DB,JSON.stringify(d))}
function saveFolders(f){localStorage.setItem(DB_FOLDERS,JSON.stringify(f))}

let entries=load(), folders=loadFolders();
let pendingAudio={name:null,data:null};
let calYear,calMonth,currentAudio=null;
let allFilterFolder='all';

function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(s){const[,m,d]=s.split('-');return`${parseInt(m)}/${parseInt(d)}`}
function fmtDateKr(s){const[y,m,d]=s.split('-');return`${y}년 ${parseInt(m)}월 ${parseInt(d)}일`}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function getFolder(id){return folders.find(f=>f.id===id)}

function folderBadgeHTML(folderId){
  const f=getFolder(folderId);
  if(!f)return'';
  return`<span class="folder-badge" style="background:${f.color}22;color:${f.color}">${f.name}</span>`;
}

function audioBlock(entry){
  if(!entry.audioData)return`<div class="no-audio"><i class="ti ti-volume-off"></i><span>음성 파일 없음</span></div>`;
  return`<div class="audio-player"><button class="play-btn" onclick="toggleAudio(${entry.id})" id="pb${entry.id}"><i class="ti ti-player-play" id="pi${entry.id}"></i></button><div class="audio-info"><div class="audio-name">${entry.audioName||'음성 파일'}</div><div class="audio-hint">탭하여 재생</div></div></div>`;
}

function entryHTML(entry, backFn){
  return`
    ${backFn?`<button class="back-btn" onclick="${backFn}"><i class="ti ti-arrow-left"></i>목록으로</button>`:''}
    ${backFn?`<div class="detail-actions">
      <button class="btn-edit" onclick="editEntryFromDetail(${entry.id})"><i class="ti ti-edit" style="font-size:15px"></i>수정</button>
      <button class="btn-delete" onclick="confirmDelete(${entry.id})"><i class="ti ti-trash" style="font-size:15px"></i>삭제</button>
    </div>`:''}
    <div class="${backFn?'card':'card'}">
      <div><span class="badge-date">${fmtDateKr(entry.date)}</span>${folderBadgeHTML(entry.folder)}</div>
      <div class="korean">${entry.korean}</div>
      <div class="english">${entry.english}</div>
      ${audioBlock(entry)}
      ${entry.thinking?`<div class="thinking-box"><strong style="font-size:11px;opacity:0.7">영사고</strong><br>${entry.thinking.replace(/\n/g,'<br>')}</div>`:''}
    </div>
    ${entry.words?`<div class="card card-sm"><div class="section-label"><i class="ti ti-a-b"></i>단어</div><div class="word-chips">${entry.words.split('\n').map(w=>`<span class="chip">${w.trim()}</span>`).join('')}</div></div>`:''}
    ${entry.explanation?`<div class="card card-sm"><div class="section-label"><i class="ti ti-bulb"></i>해설</div><div class="explanation">${entry.explanation}</div></div>`:''}
  `;
}

/* TODAY */
function renderToday(){
  const entry=entries.find(e=>e.date===today());
  document.getElementById('screen-today').innerHTML=entry?entryHTML(entry,null)
    :`<div class="empty"><i class="ti ti-book-off"></i><p>오늘 등록된 표현이 없어요</p><small>관리 탭에서 추가해보세요</small></div>`;
}

/* ALL */
function renderAll(){
  const el=document.getElementById('screen-all');
  let filtered=entries.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(allFilterFolder!=='all') filtered=filtered.filter(e=>e.folder===allFilterFolder);

  const folderBtns=[{id:'all',name:'전체',color:'#534AB7'},...folders]
    .map(f=>`<button class="folder-chip${allFilterFolder===f.id?' active':''}" onclick="setAllFilter('${f.id}')" style="${allFilterFolder===f.id?'':''}">
      ${f.id!=='all'?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${f.color};margin-right:4px;vertical-align:1px"></span>`:''}${f.name}
    </button>`).join('');

  el.innerHTML=`
    <div class="folder-filter">${folderBtns}</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">총 ${filtered.length}개의 표현</div>
    ${filtered.map(e=>{
      const f=getFolder(e.folder);
      return`<div class="expr-item" onclick="showExprDetail(${e.id})">
        <div class="expr-item-body">
          <div class="expr-item-date">${fmtDateKr(e.date)}${f?`<span style="background:${f.color}22;color:${f.color};font-size:10px;padding:1px 7px;border-radius:10px">${f.name}</span>`:''}</div>
          <div class="expr-item-kor">${e.korean}</div>
          <div class="expr-item-eng">${e.english}</div>
        </div>
        <i class="ti ti-chevron-right expr-item-chevron"></i>
      </div>`;
    }).join('')}
    ${filtered.length===0?'<div class="empty" style="padding:32px 20px"><i class="ti ti-inbox"></i><p>표현이 없어요</p></div>':''}
    <div style="height:8px"></div>
  `;
}

function setAllFilter(fid){allFilterFolder=fid;renderAll()}

function showExprDetail(id){
  const entry=entries.find(e=>e.id===id);if(!entry)return;
  const el=document.getElementById('screen-all');
  el.innerHTML=entryHTML(entry,'renderAll()');
  el.scrollTop=0;
}

function editEntryFromDetail(id){showTab('admin');setTimeout(()=>editEntry(id),100)}

/* CONFIRM DELETE */
function confirmDelete(id){
  const entry=entries.find(e=>e.id===id);if(!entry)return;
  const ov=document.createElement('div');
  ov.className='confirm-overlay';
  ov.innerHTML=`<div class="confirm-box">
    <div class="confirm-title">표현 삭제</div>
    <div class="confirm-msg">"${entry.english}" 을(를) 삭제할까요? 이 작업은 되돌릴 수 없어요.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="this.closest('.confirm-overlay').remove()">취소</button>
      <button class="confirm-ok" onclick="deleteEntry(${id})">삭제</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function deleteEntry(id){
  document.querySelector('.confirm-overlay')?.remove();
  entries=entries.filter(e=>e.id!==id);
  save(entries);
  showToast('삭제됐어요');
  renderAll();
}

function toggleAudio(id){
  const entry=entries.find(e=>e.id===id);if(!entry?.audioData)return;
  const icon=document.getElementById('pi'+id);
  if(currentAudio){
    currentAudio.pause();currentAudio.currentTime=0;
    const was=currentAudio._entryId===id;currentAudio=null;
    if(icon)icon.className='ti ti-player-play';if(was)return;
  }
  currentAudio=new Audio(entry.audioData);currentAudio._entryId=id;
  if(icon)icon.className='ti ti-player-pause';
  currentAudio.play();
  currentAudio.onended=()=>{currentAudio=null;if(icon)icon.className='ti ti-player-play'};
}

/* CALENDAR */
function renderCalendar(){
  const now=new Date();
  if(calYear===undefined){calYear=now.getFullYear();calMonth=now.getMonth()}
  const todayStr=today(),entryDates=new Set(entries.map(e=>e.date));
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const first=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate();
  let days='';
  for(let i=0;i<first;i++)days+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=ds===todayStr?' today':entryDates.has(ds)?' has':'';
    days+=`<button class="cal-day${cls}" onclick="pickDay('${ds}')">${d}</button>`;
  }
  document.getElementById('screen-calendar').innerHTML=`
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="cal-title">${calYear}년 ${months[calMonth]}</div>
        <button class="cal-nav" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid">
        ${['일','월','화','수','목','금','토'].map(d=>`<div class="cal-day-label">${d}</div>`).join('')}${days}
      </div>
      <div class="cal-legend">
        <span><span class="cal-legend-dot" style="background:#AFA9EC"></span>표현 있는 날</span>
        <span><span class="cal-legend-dot" style="background:#534AB7"></span>오늘</span>
      </div>
    </div>
    <div id="cal-detail"></div>`;
}
function changeMonth(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--}if(calMonth>11){calMonth=0;calYear++}renderCalendar()}
function pickDay(ds){
  document.querySelectorAll('.cal-day').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.cal-day').forEach(b=>{if(b.onclick?.toString().includes(`'${ds}'`))b.classList.add('sel')});
  const entry=entries.find(e=>e.date===ds),detail=document.getElementById('cal-detail');
  if(!entry){detail.innerHTML=`<div class="empty" style="padding:24px"><p>${fmtDateKr(ds)}</p><small>등록된 표현 없음</small></div>`;return}
  detail.innerHTML=entryHTML(entry,null);
}

/* ADMIN */
function renderAdmin(){
  pendingAudio={name:null,data:null};
  const folderOptions=folders.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
  const list=entries.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(e=>{
    const f=getFolder(e.folder);
    return`<div class="entry-list-item">
      <div class="entry-list-item-left" onclick="editEntry(${e.id})" style="cursor:pointer">
        <div class="entry-list-date">${fmtDate(e.date)}${f?`<span style="background:${f.color}22;color:${f.color};font-size:10px;padding:1px 7px;border-radius:10px">${f.name}</span>`:''}</div>
        <div class="entry-list-text">${e.english}</div>
      </div>
      <button class="entry-delete" onclick="confirmDelete(${e.id})" aria-label="삭제"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');

  const folderList=folders.map((f,i)=>`
    <div class="folder-row">
      <span class="folder-color-dot" style="background:${f.color}"></span>
      <span class="folder-name-text">${f.name}</span>
      <button class="folder-delete-btn" onclick="deleteFolder('${f.id}')"><i class="ti ti-x"></i></button>
    </div>`).join('');

  document.getElementById('screen-admin').innerHTML=`
    <div class="admin-block">
      <div class="admin-heading"><i class="ti ti-circle-plus"></i>새 표현 등록</div>
      <div class="form-group"><label class="form-label">날짜</label><input type="date" id="a-date" value="${today()}"></div>
      <div class="form-group"><label class="form-label">폴더</label><select id="a-folder">${folderOptions}</select></div>
      <div class="form-group"><label class="form-label">한국어 문장</label><input type="text" id="a-kor" placeholder="예) 사는게 다 그렇지 뭐"></div>
      <div class="form-group"><label class="form-label">영어 표현</label><input type="text" id="a-eng" placeholder="예) Such is life."></div>
      <div class="form-group"><label class="form-label">영사고 (영어식 사고)</label><textarea id="a-think" placeholder="예) 그런(것이) 이야 인생."></textarea></div>
      <div class="form-group"><label class="form-label">단어 분석 (줄바꿈으로 구분)</label><textarea id="a-words" placeholder="예) such - a. 그러한"></textarea></div>
      <div class="form-group"><label class="form-label">해설</label><textarea id="a-exp" placeholder="해설을 입력하세요"></textarea></div>
      <div class="form-group">
        <label class="form-label">음성 파일 (MP3 / M4A)</label>
        <label class="upload-zone"><i class="ti ti-upload"></i><p>탭하여 음성 파일 업로드</p><input type="file" accept="audio/*" onchange="handleAudio(this)"></label>
        <div id="a-audio-preview"></div>
      </div>
      <button class="btn-primary" onclick="saveEntry()"><i class="ti ti-device-floppy" style="font-size:17px"></i>저장하기</button>
    </div>
    <div class="divider"></div>
    <div class="admin-block">
      <div class="admin-heading"><i class="ti ti-folder"></i>폴더 관리</div>
      <div id="folder-list">${folderList}</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input type="text" id="new-folder-name" placeholder="새 폴더 이름" style="flex:1">
        <button onclick="addFolder()" style="padding:10px 14px;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">추가</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="admin-block">
      <div class="admin-heading"><i class="ti ti-list"></i>등록된 표현 (${entries.length}개)</div>
      ${list||'<div class="empty" style="padding:20px"><small>아직 등록된 표현이 없어요</small></div>'}
    </div>
    <div style="height:20px"></div>`;
}

function addFolder(){
  const name=document.getElementById('new-folder-name').value.trim();
  if(!name){showToast('폴더 이름을 입력해주세요');return}
  const color=FOLDER_COLORS[folders.length%FOLDER_COLORS.length];
  folders.push({id:'f'+Date.now(),name,color});
  saveFolders(folders);showToast('폴더 추가 완료!');renderAdmin();
}

function deleteFolder(id){
  if(entries.some(e=>e.folder===id)){showToast('이 폴더에 표현이 있어요. 먼저 표현을 이동하거나 삭제해주세요');return}
  folders=folders.filter(f=>f.id!==id);saveFolders(folders);showToast('폴더 삭제 완료');renderAdmin();
}

function handleAudio(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    pendingAudio={name:file.name,data:e.target.result};
    const p=document.getElementById('a-audio-preview');
    if(p)p.innerHTML=`<div class="file-chip"><i class="ti ti-file-music"></i><span>${file.name}</span><button onclick="clearAudio()"><i class="ti ti-x" style="font-size:14px"></i></button></div>`;
  };r.readAsDataURL(file);
}
function clearAudio(){
  pendingAudio={name:null,data:null};
  const p=document.getElementById('a-audio-preview');if(p)p.innerHTML='';
  const i=document.querySelector('#screen-admin input[type=file]');if(i)i.value='';
}

function saveEntry(){
  const date=document.getElementById('a-date').value;
  const kor=document.getElementById('a-kor').value.trim();
  const eng=document.getElementById('a-eng').value.trim();
  if(!date||!kor||!eng){showToast('날짜, 한국어, 영어는 필수예요');return}
  const idx=entries.findIndex(e=>e.date===date);
  const obj={
    id:idx>=0?entries[idx].id:Date.now(),date,
    folder:document.getElementById('a-folder').value,
    korean:kor,english:eng,
    thinking:document.getElementById('a-think').value.trim(),
    words:document.getElementById('a-words').value.trim(),
    explanation:document.getElementById('a-exp').value.trim(),
    audioName:pendingAudio.name||(idx>=0?entries[idx].audioName:null),
    audioData:pendingAudio.data||(idx>=0?entries[idx].audioData:null)
  };
  if(idx>=0)entries[idx]=obj;else entries.push(obj);
  save(entries);showToast(idx>=0?'수정 완료! ✓':'저장 완료! ✓');
  setTimeout(()=>renderAdmin(),300);
}

function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  const el=document.getElementById('screen-admin');el.scrollTop=0;
  document.getElementById('a-date').value=e.date;
  document.getElementById('a-folder').value=e.folder||folders[0]?.id||'';
  document.getElementById('a-kor').value=e.korean;
  document.getElementById('a-eng').value=e.english;
  document.getElementById('a-think').value=e.thinking||'';
  document.getElementById('a-words').value=e.words||'';
  document.getElementById('a-exp').value=e.explanation||'';
  if(e.audioData){
    pendingAudio={name:e.audioName,data:e.audioData};
    const p=document.getElementById('a-audio-preview');
    if(p)p.innerHTML=`<div class="file-chip"><i class="ti ti-file-music"></i><span>${e.audioName||'음성파일'}</span><button onclick="clearAudio()"><i class="ti ti-x" style="font-size:14px"></i></button></div>`;
  }
  showToast('내용 수정 후 저장하세요');
}

/* TABS */
function showTab(tab){
  if(currentAudio){currentAudio.pause();currentAudio=null}
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['today','all','calendar','admin'][i]===tab));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  if(tab==='today')renderToday();
  else if(tab==='all')renderAll();
  else if(tab==='calendar')renderCalendar();
  else renderAdmin();
}

const now=new Date();
document.getElementById('header-date').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
showTab('today');
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}</script>
